  <text x="22" y="190" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90 22 190)">Peak heap used (MB)</text>

  <line x1="70" y1="340" x2="670" y2="340" stroke="#e5e5e5" stroke-width="1"/>
