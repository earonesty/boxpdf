  <circle cx="76" cy="318.248959778086" r="4" fill="#c1272d" /><circle cx="100" cy="283.84361997226074" r="4" fill="#c1272d" /><circle cx="130" cy="285.3571428571429" r="4" fill="#c1272d" /><circle cx="220" cy="222.08044382801666" r="4" fill="#c1272d" /><circle cx="370" cy="100.4264909847434" r="4" fill="#c1272d" /><circle cx="670" cy="40" r="4" fill="#c1272d" />
