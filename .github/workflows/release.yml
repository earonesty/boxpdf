name: Release

on:
  # Push a tag like v1.0.0 to trigger a publish.
  push:
    tags:
      - "v*"
  # Or run manually from the Actions tab.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # `id-token: write` is required for npm's OIDC-based trusted publishing
    # (configured via `npm trust github boxpdf --repo earonesty/boxpdf
    # --file release.yml`). With OIDC there's no NPM_TOKEN secret — the
    # job mints a short-lived token by proving its identity to npm.
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        # `version` is omitted on purpose — the action reads `packageManager`
        # from package.json. Specifying both causes ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        # Node 24 includes an npm version new enough for OIDC trusted publishing.
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        # `--provenance` requires the `id-token: write` permission above and
        # records the build's GitHub Actions origin in npm's provenance
        # ledger so consumers can verify where the published bytes came from.
        run: npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
